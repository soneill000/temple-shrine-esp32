; TempleShrine: a TempleOS-themed launcher and collection of ported/
; reimagined games for the 2024 DEF CON badge.

[platformio]
default_envs = defcon-badge

[env:defcon-badge]
platform = espressif32
board = defcon-badge
framework = espidf
monitor_speed = 115200
build_flags =
    -Wno-unused-variable
    -Wno-unused-function
    -Wno-unused-but-set-variable
